version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: hot-sentinel-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hot_sentinel
      MYSQL_USER: sentinel
      MYSQL_PASSWORD: sentinel123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hot-sentinel-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hot-sentinel-app
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: sentinel
      DB_PASSWORD: sentinel123
      DB_NAME: hot_sentinel
    ports:
      - "3000:3000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./server:/app/server
      - ./dist:/app/dist
    networks:
      - hot-sentinel-network

volumes:
  mysql_data:

networks:
  hot-sentinel-network:
    driver: bridge
